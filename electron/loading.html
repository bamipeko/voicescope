<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>VoiceScope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #393939;
      color: #9ca3af;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .logo { font-size: 48px; margin-bottom: 24px; }
    h1 { color: #fff; font-size: 24px; margin-bottom: 12px; }
    .status { font-size: 14px; margin-bottom: 24px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #374151;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f87171; display: none; margin-top: 16px; font-size: 13px; max-width: 400px; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">🎙️</div>
  <h1>VoiceScope</h1>
  <p class="status" id="status">サーバーを起動しています...</p>
  <div class="spinner" id="spinner"></div>
  <p class="error" id="error"></p>

  <script>
    const SERVER_URL = `http://localhost:${new URLSearchParams(window.location.search).get('port') || 5100}`;
    let attempts = 0;
    const MAX_ATTEMPTS = 30;

    async function checkServer() {
      attempts++;
      document.getElementById('status').textContent =
        `サーバーを起動しています... (${attempts}秒)`;

      try {
        const res = await fetch(`${SERVER_URL}/api/health`, { signal: AbortSignal.timeout(2000) });
        if (res.ok) {
          document.getElementById('status').textContent = 'アプリを読み込んでいます...';
          window.location.href = SERVER_URL;
          return;
        }
      } catch (e) {
        // Server not ready yet
      }

      if (attempts >= MAX_ATTEMPTS) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'サーバーの起動に失敗しました';
        const errEl = document.getElementById('error');
        errEl.style.display = 'block';
        errEl.textContent = `${SERVER_URL} に接続できません。アプリを再起動してください。`;
        return;
      }

      setTimeout(checkServer, 1000);
    }

    checkServer();
  </script>
</body>
</html>
